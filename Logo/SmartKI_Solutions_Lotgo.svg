<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A73E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A73E8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon -->
  <rect x="16" y="20" width="120" height="120" rx="22" ry="22" fill="url(#bgGrad)" />

  <!-- Network nodes -->
  <circle cx="76" cy="80" r="9" fill="#FFFFFF" opacity="0.95" filter="url(#glow)"/>
  <circle cx="44" cy="55" r="6" fill="#00C6FF" opacity="0.9"/>
  <circle cx="108" cy="55" r="6" fill="#00C6FF" opacity="0.9"/>
  <circle cx="44" cy="105" r="6" fill="#00C6FF" opacity="0.9"/>
  <circle cx="108" cy="105" r="6" fill="#00C6FF" opacity="0.9"/>
  <circle cx="76" cy="42" r="5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="76" cy="118" r="5" fill="#FFFFFF" opacity="0.7"/>

  <!-- Connection lines -->
  <line x1="76" y1="80" x2="44" y2="55" stroke="#FFFFFF" stroke-width="1.8" opacity="0.6"/>
  <line x1="76" y1="80" x2="108" y2="55" stroke="#FFFFFF" stroke-width="1.8" opacity="0.6"/>
  <line x1="76" y1="80" x2="44" y2="105" stroke="#FFFFFF" stroke-width="1.8" opacity="0.6"/>
  <line x1="76" y1="80" x2="108" y2="105" stroke="#FFFFFF" stroke-width="1.8" opacity="0.6"/>
  <line x1="76" y1="80" x2="76" y2="42" stroke="#00C6FF" stroke-width="1.8" opacity="0.7"/>
  <line x1="76" y1="80" x2="76" y2="118" stroke="#00C6FF" stroke-width="1.8" opacity="0.7"/>
  <line x1="44" y1="55" x2="108" y2="55" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="44" y1="105" x2="108" y2="105" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="44" y1="55" x2="44" y2="105" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="108" y1="55" x2="108" y2="105" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>

  <!-- Text: "Smart" in dark blue + "KI" in cyan — written together as one word -->
  <text font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="800" y="82" letter-spacing="-1">
    <tspan x="158" fill="#1A73E8">Smart</tspan><tspan fill="#00C6FF">KI</tspan>
  </text>

  <!-- Accent underline -->
  <rect x="158" y="92" width="218" height="4" rx="2" fill="url(#accentGrad)" opacity="0.85"/>

  <!-- "Solutions" -->
  <text x="158" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="24"
        font-weight="400" fill="#444444" letter-spacing="5">SOLUTIONS</text>

</svg>
