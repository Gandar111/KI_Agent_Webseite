<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" width="620" height="180">
  <defs>
    <!-- Claude-style warm gradient -->
    <linearGradient id="claudeIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4845A"/>
      <stop offset="50%" style="stop-color:#C96A3B"/>
      <stop offset="100%" style="stop-color:#A0522D"/>
    </linearGradient>
    <linearGradient id="claudeText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C96A3B"/>
      <stop offset="100%" style="stop-color:#D4845A"/>
    </linearGradient>
  </defs>

  <!-- Warm cream background like Claude -->
  <rect width="620" height="180" fill="#FBF8F4"/>

  <!-- ICON: Claude-style organic rounded square -->
  <rect x="24" y="28" width="108" height="108" rx="26" fill="url(#claudeIcon)"/>

  <!-- Abstract rays / spark inside — Claude-inspired -->
  <!-- Center dot -->
  <circle cx="78" cy="82" r="10" fill="#FFFFFF" opacity="0.95"/>

  <!-- 4 bold strokes radiating outward -->
  <line x1="78" y1="82" x2="78" y2="48" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <line x1="78" y1="82" x2="78" y2="116" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <line x1="78" y1="82" x2="44" y2="82" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <line x1="78" y1="82" x2="112" y2="82" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.9"/>

  <!-- 4 thinner diagonal strokes -->
  <line x1="78" y1="82" x2="52" y2="56" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="78" y1="82" x2="104" y2="56" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="78" y1="82" x2="52" y2="108" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="78" y1="82" x2="104" y2="108" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>

  <!-- WORDMARK: Smart in dark, KI in Claude-orange — thin modern font -->
  <text
    x="156"
    y="100"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="62"
    font-weight="200"
    letter-spacing="2"
    fill="#2B1A0E"
  >Smart<tspan fill="url(#claudeText)">KI</tspan></text>

  <!-- Warm orange thin divider -->
  <rect x="156" y="114" width="415" height="1.5" rx="2" fill="url(#claudeText)" opacity="0.3"/>

  <!-- SOLUTIONS -->
  <text
    x="158"
    y="150"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="12"
    fill="#B08060"
  >SOLUTIONS</text>

</svg>
