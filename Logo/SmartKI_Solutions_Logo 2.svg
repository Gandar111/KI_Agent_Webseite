<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">

  <!-- Modern white background -->
  <rect width="600" height="180" fill="#FFFFFF"/>

  <!-- Subtle light grey bottom strip -->
  <rect x="0" y="160" width="600" height="20" fill="#F5F5F5"/>

  <!-- ICON: Red square with abstract circuit/node symbol -->
  <rect x="28" y="30" width="100" height="100" fill="#E8000D" rx="6"/>

  <!-- Abstract AI node symbol inside red square -->
  <!-- Center node -->
  <circle cx="78" cy="80" r="10" fill="#FFFFFF"/>
  <!-- Surrounding nodes -->
  <circle cx="54" cy="60" r="5.5" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="102" cy="60" r="5.5" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="54" cy="100" r="5.5" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="102" cy="100" r="5.5" fill="#FFFFFF" opacity="0.85"/>
  <!-- Connection lines -->
  <line x1="78" y1="80" x2="54" y2="60" stroke="#FFFFFF" stroke-width="2.2" opacity="0.8"/>
  <line x1="78" y1="80" x2="102" y2="60" stroke="#FFFFFF" stroke-width="2.2" opacity="0.8"/>
  <line x1="78" y1="80" x2="54" y2="100" stroke="#FFFFFF" stroke-width="2.2" opacity="0.8"/>
  <line x1="78" y1="80" x2="102" y2="100" stroke="#FFFFFF" stroke-width="2.2" opacity="0.8"/>

  <!-- WORDMARK: SmartKI -->
  <text
    x="152"
    y="98"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="58"
    font-weight="900"
    letter-spacing="-2"
    fill="#111111"
  >Smart<tspan fill="#E8000D">KI</tspan></text>

  <!-- Red thin divider -->
  <rect x="152" y="112" width="400" height="2.5" fill="#E8000D" opacity="0.35"/>

  <!-- SOLUTIONS subtext -->
  <text
    x="154"
    y="148"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="15"
    font-weight="400"
    letter-spacing="10"
    fill="#999999"
  >SOLUTIONS</text>

</svg>
