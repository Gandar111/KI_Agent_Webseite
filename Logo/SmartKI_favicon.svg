<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <defs>
    <linearGradient id="gradSym" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2FBE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9457A;stop-opacity:1" />
    </linearGradient>
    <mask id="maskRing">
      <!-- Outer filled circle -->
      <circle cx="100" cy="100" r="72" fill="white"/>
      <!-- Inner hollow -->
      <circle cx="100" cy="100" r="44" fill="black"/>
      <!-- Gap at top-right, rotated ~45deg -->
      <rect x="88" y="20" width="48" height="26" rx="13" fill="black" transform="rotate(45 112 33)"/>
    </mask>
  </defs>

  <rect width="200" height="200" fill="#FFFFFF"/>

  <!-- Outer ring with gap -->
  <circle cx="100" cy="100" r="72" fill="url(#gradSym)" mask="url(#maskRing)"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="34" fill="none" stroke="url(#gradSym)" stroke-width="12"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="8" fill="url(#gradSym)"/>

</svg>
